spring.application.name=TrackWise

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5433/trackwise_db
spring.datasource.username=trackwise_user
spring.datasource.password=trackwise_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# Disable Hibernate auto-DDL (Flyway handles it)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY MIGRATIONS
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# SECURITY
# ===============================
# Disable default security for now so actuator endpoints work
# spring.security.user.name=admin
# spring.security.user.password=admin
